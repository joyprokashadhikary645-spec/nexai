[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# আসল Next.js (App Router, API routes, streaming) সঠিকভাবে ডিপ্লয় করার জন্য
# এই প্লাগিনটাই সব রাউটিং/ফাংশন/ক্যাশিং নিজে থেকে ম্যানেজ করে —
# ম্যানুয়াল SPA redirect বা publish path লাগবে না
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# স্ট্যাটিক অ্যাসেট ক্যাশিং
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Context-specific settings
[context.branch-deploy]
  environment = { NODE_ENV = "development" }
